name: Deploy a Webempresa (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Subir por FTPS a resenas.lauragarias.com
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD_B64: ${{ secrets.FTP_PASSWORD_B64 }}
        run: python3 deploy_ftp.py
